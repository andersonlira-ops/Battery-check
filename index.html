<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro de Comando — Operações ASB</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090a0f;
      --surface: #12141d;
      --text: #e2e8f0;
      --neon-green: #39ff14;
      --neon-red: #ff073a;
      --border-dark: rgba(255,255,255,0.08);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border-dark);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .brand { font-size: 24px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    .brand span { color: var(--neon-green); text-shadow: 0 0 10px rgba(57,255,20,0.4); }
    
    .stats { display: flex; gap: 20px; }
    .stat-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-dark);
      padding: 8px 16px;
      border-radius: 6px;
      text-align: center;
    }
    .stat-value { font-family: 'Roboto Mono', monospace; font-size: 18px; font-weight: 600; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; }
    .val-green { color: var(--neon-green); }
    .val-red { color: var(--neon-red); }

    .controls { display: flex; gap: 10px; align-items: center; }
    .search-input {
      background: rgba(0,0,0,0.5); border: 1px solid var(--border-dark);
      color: white; padding: 8px 12px; border-radius: 4px;
      font-family: 'Roboto Mono'; font-size: 14px; outline: none; text-transform: uppercase;
    }
    .search-input:focus { border-color: var(--neon-green); }
    .btn {
      background: transparent; color: white; border: 1px solid var(--border-dark);
      padding: 8px 16px; border-radius: 4px; cursor: pointer;
      font-family: 'Rajdhani'; font-weight: 600; font-size: 14px; transition: all 0.2s;
    }
    .btn:hover { background: rgba(255,255,255,0.05); }

    /* ── GRID DE CARDS ── */
    main { padding: 30px; flex: 1; overflow-y: auto; }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border-radius: 8px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-3px); }

    /* EFEITO NEON - DISPONÍVEL (VERDE) */
    .card.disp {
      border: 1px solid rgba(57,255,20,0.3);
      box-shadow: inset 0 0 20px rgba(57,255,20,0.02), 0 0 10px rgba(57,255,20,0.1);
    }
    /* EFEITO NEON - VENDIDO (VERMELHO) */
    .card.vendido {
      border: 1px solid rgba(255,7,58,0.5);
      box-shadow: inset 0 0 20px rgba(255,7,58,0.05), 0 0 15px rgba(255,7,58,0.2);
    }

    /* ETIQUETA DE ALERTA */
    .alerta-badge {
      position: absolute; top: 15px; right: -30px;
      background: var(--neon-red); color: white;
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      padding: 4px 30px; transform: rotate(45deg);
      box-shadow: 0 0 10px var(--neon-red);
      display: none;
    }
    .card.vendido .alerta-badge { display: block; }

    /* INFO DO CARD */
    .card-placa { font-family: 'Roboto Mono'; font-size: 28px; font-weight: 600; text-align: center; letter-spacing: 2px; }
    .card.disp .card-placa { color: var(--neon-green); text-shadow: 0 0 8px rgba(57,255,20,0.3); }
    .card.vendido .card-placa { color: var(--neon-red); text-shadow: 0 0 8px rgba(255,7,58,0.3); text-decoration: line-through; opacity: 0.8; }
    
    .card-modelo { text-align: center; font-size: 12px; color: #888; text-transform: uppercase; margin-top: -8px; margin-bottom: 8px; }

    .info-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border-dark); }
    .info-label { font-size: 11px; color: #666; text-transform: uppercase; font-weight: 600; }
    .info-val { font-family: 'Roboto Mono'; font-size: 14px; font-weight: 600; }
    
    .bateria-critica { color: #ff9800; }

    /* LOADER */
    .loader-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; width: 100%; color: var(--neon-green); }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(57,255,20,0.1); border-top-color: var(--neon-green); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <div class="brand">Monitor <span>Frota ASB</span></div>
    
    <div class="stats">
      <div class="stat-box"><div class="stat-value" id="st-total">0</div><div class="stat-label">Total</div></div>
      <div class="stat-box"><div class="stat-value val-green" id="st-disp">0</div><div class="stat-label">Disponíveis</div></div>
      <div class="stat-box"><div class="stat-value val-red" id="st-vendidos">0</div><div class="stat-label">Vendidos</div></div>
    </div>

    <div class="controls">
      <input type="text" id="busca" class="search-input" placeholder="BUSCAR PLACA..." onkeyup="filtrarCards()">
      <button class="btn" onclick="carregarDados()">↺ Atualizar</button>
    </div>
  </header>

  <main>
    <div id="loader" class="loader-container">
      <div class="spinner"></div>
      <div style="font-family: 'Roboto Mono'; letter-spacing: 2px;">SINCRONIZANDO DATA WAREHOUSE...</div>
    </div>
    <div class="grid" id="grid"></div>
  </main>

  <script>
    // =========================================================
    // 🔴 COLE AQUI O LINK NOVO GERADO NO GOOGLE APPS SCRIPT 
    // =========================================================
    const URL_API = "https://script.google.com/macros/s/AKfycbz27fNRRsPI2tLeb9Vrffgcfk4lzsXFzdEcMXkzlmgOQB8ep7CT9YEYiT-cnZ0jwhEJzg/exec";

    let carrosGlobal = [];

    function carregarDados() {
      const grid = document.getElementById('grid');
      const loader = document.getElementById('loader');
      
      grid.innerHTML = '';
      loader.style.display = 'flex';

      // 1. Criamos um nome de função temporário e único
      const callbackName = 'google_callback_' + Math.round(Math.random() * 1000000);
      
      // 2. Definimos o que o site vai fazer quando o Google responder
      window[callbackName] = function(dados) {
        delete window[callbackName]; // Limpa a memória
        document.getElementById('script_loader')?.remove(); // Remove o script usado

        if (dados.erro) {
          loader.innerHTML = `<div style="color:var(--neon-red);">ERRO: ${dados.erro}</div>`;
          return;
        }

        carrosGlobal = dados;
        renderizarCards(carrosGlobal);
        atualizarStats();
        loader.style.display = 'none';
      };

      // 3. O "Gatilho Mágico" (JSONP) que ignora o bloqueio de CORS
      const script = document.createElement('script');
      script.id = 'script_loader';
      // Adicionamos o callback e um número aleatório (cache buster) no link
      script.src = URL_API + (URL_API.includes('?') ? '&' : '?') + 'callback=' + callbackName + '&cb=' + Date.now();
      
      // Se a internet cair ou o Google não responder
      script.onerror = () => {
        loader.innerHTML = `<div style="color:var(--neon-red);">ERRO DE CONEXÃO: Falha ao carregar os dados do Google.</div>`;
        delete window[callbackName];
      };

      document.body.appendChild(script);
    }
    function renderizarCards(lista) {
      const grid = document.getElementById('grid');
      const loader = document.getElementById('loader');
      loader.style.display = 'none';
      grid.innerHTML = '';

      if (lista.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #666; margin-top: 50px;">Nenhum veículo encontrado.</div>`;
        return;
      }

      lista.forEach(carro => {
        // Se for vendido, classe = 'vendido'. Se não, classe = 'disp'
        const classeStatus = carro.vendido ? 'vendido' : 'disp';
        
        const card = document.createElement('div');
        card.className = `card ${classeStatus}`;
        card.innerHTML = `
          <div class="alerta-badge">VENDIDO</div>
          <div class="card-placa">${carro.placa}</div>
          <div class="card-modelo">${carro.modelo || 'MODELO NÃO INFORMADO'}</div>
          
          <div class="info-row">
            <span class="info-label">Bateria</span>
            <span class="info-val bateria-critica">${carro.bateria} V</span>
          </div>
          
          <div class="info-row">
            <span class="info-label">Localização</span>
            <span class="info-val">${carro.local}</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function atualizarStats() {
      const total = carrosGlobal.length;
      const vendidos = carrosGlobal.filter(c => c.vendido).length;
      const disponiveis = total - vendidos;

      document.getElementById('st-total').innerText = total;
      document.getElementById('st-disp').innerText = disponiveis;
      document.getElementById('st-vendidos').innerText = vendidos;
    }

    function filtrarCards() {
      const termo = document.getElementById('busca').value.toUpperCase().trim();
      if (!termo) {
        renderizarCards(carrosGlobal);
        return;
      }
      const filtrados = carrosGlobal.filter(c => c.placa.includes(termo));
      renderizarCards(filtrados);
    }

    // Inicia ao abrir a página
    window.onload = carregarDados;
  </script>
</body>
</html>
